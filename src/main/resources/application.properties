spring.application.name=nutique-backend

# MongoDB connection - set via environment variable in production
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nutique_co}

# Server port
server.port=${PORT:8080}

# JWT secret - MUST override in production via environment variable
app.jwt.secret=${JWT_SECRET:change-this-secret-key-in-production-make-it-long-and-random-please}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS - frontend URLs allowed to call this API
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Default admin user (created on startup if not exists)
app.admin.default-username=${ADMIN_USERNAME:admin}
app.admin.default-password=${ADMIN_PASSWORD:nutique123}

# WhatsApp business number (international format, digits only, no +)
# e.g. for 077 123 4567 use 94771234567
app.whatsapp.business-number=${WHATSAPP_BUSINESS_NUMBER:94762245460}

# Logging
logging.level.org.springframework.data.mongodb.core=WARN


# Allow image uploads up to 5MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB